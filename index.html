    font-synthesis: none;
    background: var(--ground);
    color: var(--ink);
    overflow: hidden;
    cursor: default;
  }

  /* ---- the seal's shadow on the floor (it hangs above it) ---- */
  .sealshadow {
    position: absolute;
    z-index: -1;
    bottom: calc(-1 * clamp(0.5rem, 1vw, 0.9rem));
    left: 50%;
    width: calc(clamp(2.4rem, 8.2vw, 5rem) * 4.1);
    height: calc(clamp(2.4rem, 8.2vw, 5rem) * 0.8);
    transform: translate(calc(-50% + var(--fx) + var(--shx, 0px)), calc(var(--fy) + var(--shy, 0px)));
    background: radial-gradient(closest-side, rgba(0,0,0,0.6), rgba(0,0,0,0) 74%);
    filter: blur(3px);
    opacity: var(--sho, 0);
    pointer-events: none;
  }

  /* ========== THE SEAL — wax, suspended above the floor ========== */
  .sealzone {
    position: relative;
    margin-bottom: clamp(1.6rem, 3vw, 2.6rem);
  }
  .seal {
    display: block;
    border: none;
    background-color: transparent;
    padding: 0;
    width: calc(clamp(2.4rem, 8.2vw, 5rem) * 3.6);

    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    cursor: pointer;
    --smx: -100vmax; --smy: -100vmax;
    -webkit-mask-image: radial-gradient(22rem 22rem at var(--smx) var(--smy),
      rgba(0,0,0,1) 0%, rgba(0,0,0,0.55) 52%, transparent 78%, transparent 100%);
    mask-image: radial-gradient(22rem 22rem at var(--smx) var(--smy),
      rgba(0,0,0,1) 0%, rgba(0,0,0,0.55) 52%, transparent 78%, transparent 100%);
  }
  .seal:focus-visible {
    outline: 1px solid var(--gold-soft);
    outline-offset: 10px;
    border-radius: 50%;
  }

  /* ========== THE GATE — clavis ad Catalogum ========== */
  .gate {
    margin-top: 2.4rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    opacity: 0;
    transform: translateY(-6px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .gate[hidden] { display: none; }
  .gate.open { opacity: 1; transform: none; }
  .gate input {
    font-family: inherit;
    font-size: 1.05rem;
    letter-spacing: 0.22em;
    text-align: center;
    color: var(--ink);
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(162, 156, 144, 0.35);
    padding: 0.55rem 1rem;
    width: min(16rem, 72vw);
    outline: none;
    transition: border-color 0.3s ease;
  }
  .gate input:focus { border-color: var(--gold-soft); }
  .gate button {
    font-family: inherit;
    text-transform: uppercase;
    letter-spacing: 0.34em;
    text-indent: 0.34em;
    font-size: 0.8rem;
    color: var(--muted);
    background: none;
    border: 1px solid rgba(162, 156, 144, 0.3);
    padding: 0.55rem 1.4rem;
    cursor: pointer;
    transition: color 0.3s ease, border-color 0.3s ease;
  }
  .gate button:hover, .gate button:focus-visible {
    color: var(--gold-bright);
    border-color: var(--gold-soft);
  }
  .gatemsg {
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-indent: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    min-height: 1.1em;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .gatemsg.show { opacity: 1; }

  /* ========== THE LAMP ========== */
  .lamp {
    position: fixed; inset: 0;
    z-index: 3;
    opacity: calc(1 - var(--flood, 0));
    background:
      radial-gradient(40rem 40rem at var(--mx) var(--my),
        rgba(232, 222, 200, 0.10) 0%,
        rgba(190, 160, 90, 0.045) 30%,
        rgba(13, 12, 11, 0) 70%);
    mix-blend-mode: screen;
    pointer-events: none;
  }
  .vignette {
    position: fixed; inset: 0;
    z-index: 4;
    opacity: calc(1 - var(--flood, 0));
    background: radial-gradient(120vmax 120vmax at 50% 45%,
      transparent 0%, transparent 52%, rgba(0,0,0,0.6) 100%);
    pointer-events: none;
  }

  /* ========== COMPOSITION ========== */
  main {
    position: relative;
    z-index: 5;
    touch-action: pan-y;
    transition: opacity 1.4s ease;
  }
  body.day main {
    opacity: 0;
    pointer-events: none;
  }
  main {
    position: relative;
    z-index: 5;
    height: 100%;
    height: 100dvh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1.5rem;
  }
  .col {
    margin: auto;            /* centres when there is room, scrolls when there is not */
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    width: 100%;
  }
  .eyebrow {
    font-weight: 400;
    font-size: 0.78rem;
    letter-spacing: 0.62em;
    text-indent: 0.62em;
    text-transform: uppercase;
    color: var(--muted);
  }

  h1 {
    margin-top: 1.6rem;
    font-family: "Cormorant Unicase Web", "Cormorant Unicase", "Cormorant", Georgia, serif;
    font-weight: 400;
    text-transform: uppercase;
    line-height: 1.08;
  }
  h1 .l1 {
    display: block;
    font-size: clamp(2rem, 6.7vw, 4.1rem);
    letter-spacing: 0.18em;
    text-indent: 0.18em;
    background:
      linear-gradient(calc(var(--ga) * 1deg),
        rgba(255, 255, 250, 0) 42%,
        rgba(255, 255, 250, calc(0.06 + var(--i) * 0.20)) 50%,
        rgba(255, 255, 250, 0) 58%),
      linear-gradient(var(--ivory), var(--ivory));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  h1 .l2 {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.4rem;
    margin-top: 0.55rem;
    font-size: clamp(1.25rem, 3.8vw, 2.2rem);
    font-weight: 400;
    letter-spacing: 0.42em;
    text-indent: 0.42em;
  }
  h1 .l2 .resin {
    background:
      linear-gradient(calc(var(--ga) * 1deg),
        rgba(255, 255, 250, 0) 42%,
        rgba(255, 255, 250, calc(0.06 + var(--i) * 0.20)) 50%,
        rgba(255, 255, 250, 0) 58%),
      linear-gradient(var(--ivory), var(--ivory));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  h1 .l2::before, h1 .l2::after {
    content: "";
    width: clamp(2.5rem, 8vw, 5.5rem);
    height: 1.5px;
    background:
      linear-gradient(calc(var(--ga) * 1deg),
        rgba(255, 255, 250, 0) 42%,
        rgba(255, 255, 250, calc(0.06 + var(--i) * 0.20)) 50%,
        rgba(255, 255, 250, 0) 58%),
      linear-gradient(rgba(236, 230, 212, 0.85), rgba(236, 230, 212, 0.85));
  }

    text-transform: uppercase;
    color: var(--muted);
  }

    background-position: calc(50% + var(--bx)) calc(50% + var(--by)), center;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: brightness(calc(1.04 + var(--i) * 0.30)) saturate(calc(1 + var(--i) * 0.22));
    text-shadow: calc(var(--sx) * 0.30) calc(var(--sy) * 0.30) 0 rgba(58, 40, 4, 0.6);
  }
  .notice {
    margin-top: calc(3rem + clamp(2.4rem, 8.2vw, 5rem));
    font-size: 0.92rem;
    letter-spacing: 0.30em;
    text-indent: 0.30em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .contact {
    margin-top: 2.7rem;
    font-size: 1.08rem;
    letter-spacing: 0.05em;
  }
  .contact a {
    color: var(--ink);
    text-decoration: none;
    transition: color 0.4s ease;
  }
  .contact a:hover, .contact a:focus-visible { color: var(--gold-bright); }
  .contact a:focus-visible { outline: 1px solid var(--gold-soft); outline-offset: 4px; }


  /* ========== THE FADING OF THE SEAL ========== */
  .shard { display: none; }
  body.breaking .seal {
    opacity: 0;
    transition: opacity 1.15s ease;
  }

  /* ========== THE COAT OF ARMS — gold upon the daylit stone ========== */
  #coalayer {
    position: fixed; inset: 0;
    z-index: 6;
    display: flex;
    align-items: center;
    justify-content: center;
    visibility: hidden;
    pointer-events: none;
  }
  body.day #coalayer { visibility: visible; }
  .coawrap {
    position: relative;
    width: min(80vmin, 40rem);
    aspect-ratio: 1 / 1;
    opacity: 0;
    transform: scale(1.04);
    transition: opacity 1.5s ease 0.9s, transform 1.8s cubic-bezier(.3,.7,.3,1) 0.9s;
  }
  body.day .coawrap { opacity: 1; transform: scale(1); }
  #coagl, .coabaked {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }
  .coabaked { display: none; }
  .no-webgl .coabaked { display: block; }
  .no-webgl #coagl { display: none; }
  .coashadow {
    position: absolute;
    left: 50%;
    bottom: -2.5%;
    width: 80%;
    height: 7%;
    transform: translateX(calc(-50% + var(--cshx, 0px)));
    background: radial-gradient(closest-side, rgba(30, 26, 18, 0.30), rgba(30, 26, 18, 0) 76%);
    filter: blur(7px);
    z-index: -1;
  }

  @media (prefers-reduced-motion: reduce) {
    body.breaking .seal { transition: none; }
    main, .coawrap, body.day .coawrap { transition: none; transform: none; }
  }

  @media (max-width: 640px) {
    main { padding: 1.25rem 0.75rem; }
    .eyebrow { font-size: 0.64rem; letter-spacing: 0.40em; text-indent: 0.40em; }
    h1 .l1 {
      font-size: clamp(1.7rem, 9.4vw, 3rem);
      letter-spacing: 0.13em;
      text-indent: 0.13em;
    }
    h1 .l2 {
      font-size: clamp(1.2rem, 5.6vw, 2rem);
      letter-spacing: 0.30em;
      text-indent: 0.30em;
      gap: 0.9rem;
    }
    h1 .l2::before, h1 .l2::after { width: clamp(1.3rem, 9vw, 2.6rem); }
    .line   { font-size: 0.92rem; letter-spacing: 0.20em; text-indent: 0.20em; margin-top: 2rem; }
    .year   { font-size: 0.88rem; letter-spacing: 0.34em; text-indent: 0.34em; }
    .notice { font-size: 0.74rem; letter-spacing: 0.15em; text-indent: 0.15em; margin-top: calc(1.6rem + 9.4vw); }
    .contact { font-size: 0.95rem; margin-top: 1.7rem; }
    .floor { background-size: 527px auto; }
  }

  @media (prefers-reduced-motion: no-preference) {
    .col > * { opacity: 0; animation: kindle 1.6s ease forwards; }
    .col > .gate { animation: none; opacity: 0; }
    .col > .gate.open { opacity: 1; }
    .sealzone { animation-delay: 0.1s; }
    .eyebrow { animation-delay: 0.2s; }
    h1       { animation-delay: 0.5s; }
    .line    { animation-delay: 1.0s; }
    .year    { animation-delay: 1.1s; }
    .notice  { animation-delay: 1.4s; }
    .contact { animation-delay: 1.6s; }
    @keyframes kindle { from { opacity: 0; } to { opacity: 1; } }
  }
</style>
</head>
<body>

<div id="coalayer" aria-hidden="true">
  <div class="coawrap" id="coawrap">

      <div class="sealshadow" aria-hidden="true"></div>
      <button class="seal" id="seal" type="button" aria-label="Aperire Catalogum"></button>
      <div class="shard sl" aria-hidden="true"></div>
      <div class="shard sr" aria-hidden="true"></div>
    </div>
    <p class="eyebrow">Domus editoria</p>
    <h1 id="title">
      <span class="l1">Editiones</span>
      <span class="l2"><span class="resin">IBP</span></span>
    </h1>
    <p class="line">Catalogus Annuus</p>
    <p class="year">MMXXVII</p>
    <p class="notice">Pagina in apparatu est</p>
    <form class="gate" id="gate" hidden>
      <input type="password" id="clavis" autocomplete="off" spellcheck="false" aria-label="Clavis">
      <button type="submit">Aperire</button>
      <p class="gatemsg" id="gatemsg" role="status"></p>
    </form>
    <p class="contact"><a href="mailto:contact@editiones-ibp.org">contact@editiones-ibp.org</a></p>
  </div>
</main>

<script>
(function () {
  var root = document.documentElement;
  var main = document.querySelector("main");
  var title = document.getElementById("title");
  var sealEl = document.getElementById("seal");
  var reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  var tx = innerWidth / 2, ty = innerHeight * 0.42;
  var cx = tx, cy = ty;
  var lastInput = 0;          /* ambient resumes after 4s of stillness */
  var t = Math.random() * 20;
  var tc = { x: 0, y: 0 };
  var sc = { x: 0, y: 0, left: 0, top: 0 };

  function measure() {
    var r = title.getBoundingClientRect();
    tc.x = r.left + r.width / 2;
    tc.y = r.top + r.height / 2;
    var s = sealEl.getBoundingClientRect();
    sc.x = s.left + s.width / 2;
    sc.y = s.top + s.height / 2;
    sc.left = s.left;
    sc.top = s.top;
  }
  addEventListener("resize", measure);
  main.addEventListener("scroll", measure, { passive: true });
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(measure);

  function aim(x, y) { tx = x; ty = y; lastInput = performance.now(); }
  addEventListener("pointermove", function (e) { aim(e.clientX, e.clientY); }, { passive: true });
  addEventListener("pointerdown", function (e) { aim(e.clientX, e.clientY); }, { passive: true });
  addEventListener("touchmove", function (e) {
    if (e.touches.length) aim(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });
  addEventListener("touchstart", function (e) {
    if (e.touches.length) aim(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });

  function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

  function setLight(px, py) {
    root.style.setProperty("--mx", px + "px");
    root.style.setProperty("--my", py + "px");
    var ox = px - innerWidth / 2, oy = py - innerHeight / 2;
    root.style.setProperty("--fx", (ox * -0.014).toFixed(2) + "px");
    root.style.setProperty("--fy", (oy * -0.014).toFixed(2) + "px");
    sealEl.style.setProperty("--smx", (px - sc.left).toFixed(1) + "px");
    sealEl.style.setProperty("--smy", (py - sc.top).toFixed(1) + "px");

    var dx = tc.x - px, dy = tc.y - py;
    var dist = Math.sqrt(dx * dx + dy * dy);
    var i = Math.max(0, 1 - dist / 640);
    i = i * i * (3 - 2 * i);
    var s = Math.min(1.1, dist / 270) * 3.4 * i;
    var n = dist > 1 ? 1 / dist : 0;
    var sx = dx * n * s, sy = Math.max(0.35 * s, dy * n * s);
    root.style.setProperty("--sx", sx.toFixed(2) + "px");
    root.style.setProperty("--sy", sy.toFixed(2) + "px");
    root.style.setProperty("--i", i.toFixed(3));
    var ga = Math.atan2(py - tc.y, px - tc.x) * 180 / Math.PI + 90;
    root.style.setProperty("--ga", ga.toFixed(1));
    root.style.setProperty("--bx", (-dx * 0.05 * i).toFixed(2) + "%");
    root.style.setProperty("--by", (-dy * 0.05 * i).toFixed(2) + "%");

    var sdx = sc.x - px, sdy = sc.y - py;
    var sdist = Math.sqrt(sdx * sdx + sdy * sdy);
    var si = Math.max(0, 1 - sdist / 560);
    si = si * si * (3 - 2 * si);
    root.style.setProperty("--sho", (si * 0.6).toFixed(3));
    root.style.setProperty("--shx", clamp(sdx * 0.22, -70, 70).toFixed(1) + "px");
    root.style.setProperty("--shy", clamp(sdy * 0.10, -22, 30).toFixed(1) + "px");
  }

  function frame(now) {
    if (!reduced && now - lastInput > 4000) {
      /* the lamp wanders: a slow patrol over seal, title, and floor */
      t += 0.0035;
      tx = innerWidth  * (0.5 + 0.26 * Math.sin(t * 0.7));
      ty = innerHeight * (0.44 + 0.30 * Math.sin(t * 0.43 + 1.3));
    }
    cx += (tx - cx) * 0.06;
    cy += (ty - cy) * 0.06;
    setLight(cx, cy);
    if (torn) { setDaylight(cx, cy); }
    requestAnimationFrame(frame);
  }

  measure();
  setTimeout(measure, 120);
  if (reduced) {
    /* no autonomous wandering; the lamp rests on the title until a finger or
       cursor moves it - interactivity is not motion sickness */
    setTimeout(function () { measure(); tx = tc.x; ty = tc.y; cx = tx; cy = ty; }, 140);
  }
  requestAnimationFrame(frame);

  /* ========== THE GATE ========== */
  var GATE = {
    sha256: "3289731d5176e37d048bc7427b32edcfb9989f25ed1c605c6568de841f06b4d3",
    target: "reveal"   /* "reveal" = the tearing rite; later: the Catalogus URL */
  };
  var coawrap = document.getElementById("coawrap");
  var coagl = document.getElementById("coagl");
  var cc = { x: 0, y: 0, s: 300 };
  var torn = false;
  var gl = null, uLloc = null, uAmbloc = null, texReady = 0;

  function measureCoa() {
    var r = coawrap.getBoundingClientRect();
    cc.x = r.left + r.width / 2;
    cc.y = r.top + r.height / 2;
    cc.s = r.width * 0.7;
    if (gl) {
      var dpr = Math.min(devicePixelRatio || 1, 2);
      var px = Math.round(r.width * dpr);
      if (coagl.width !== px) { coagl.width = px; coagl.height = px; gl.viewport(0, 0, px, px); }
    }
  }

  /* ---- the gold: real material, lit live ---- */
  function initGL() {
    try { gl = coagl.getContext("webgl", { alpha: true, antialias: true, premultipliedAlpha: false }); } catch (e) {}
    if (!gl) { document.body.classList.add("no-webgl"); return; }
    var vs = "attribute vec2 p; varying vec2 v; void main(){ v = p*0.5+0.5; v.y = 1.0-v.y; gl_Position = vec4(p,0.,1.); }";
    var fs = "precision mediump float; varying vec2 v; uniform sampler2D uN; uniform sampler2D uA;" +
      "uniform vec3 uL; uniform float uAmb;" +
      "void main(){ vec4 a = texture2D(uA, v);" +
      " vec3 n = normalize(texture2D(uN, v).rgb*2.0-1.0);" +
      " vec3 L = normalize(uL); vec3 H = normalize(L + vec3(0.,0.,1.));" +
      " float ndl = max(dot(n,L),0.); float ndh = max(dot(n,H),0.);" +
      " float sp = pow(ndh,40.); float sp2 = pow(ndh,8.);" +
      " float sg = smoothstep(0.08,0.5,a.r);" +
      " vec3 col = a.rgb*(uAmb + 0.75*ndl) + vec3(sp*0.70+sp2*0.10, sp*0.55+sp2*0.075, sp*0.26+sp2*0.03)*sg;" +
      " gl_FragColor = vec4(col, a.a); }";
    function sh(type, src) {
      var s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) { gl = null; }
      return s;
    }
    var prog = gl.createProgram();
    gl.attachShader(prog, sh(gl.VERTEX_SHADER, vs));
    if (!gl) { document.body.classList.add("no-webgl"); return; }
    gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, fs));
    if (!gl) { document.body.classList.add("no-webgl"); return; }
    gl.linkProgram(prog); gl.useProgram(prog);
    var buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
    var loc = gl.getAttribLocation(prog, "p");
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
    uLloc = gl.getUniformLocation(prog, "uL");
    uAmbloc = gl.getUniformLocation(prog, "uAmb");
    gl.uniform1f(uAmbloc, 0.46);
    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
    gl.clearColor(0, 0, 0, 0);
    function loadTex(imgEl, unit, name) {
      var t = gl.createTexture();
      gl.activeTexture(gl.TEXTURE0 + unit);
      gl.bindTexture(gl.TEXTURE_2D, t);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, imgEl);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
      gl.uniform1i(gl.getUniformLocation(prog, name), unit);
      texReady++;
    }
    var nImg = document.getElementById("texN"), aImg = document.getElementById("texA");
    function whenLoaded(img, fn) { if (img.complete && img.naturalWidth) fn(); else img.onload = fn; }
    whenLoaded(nImg, function () { loadTex(nImg, 0, "uN"); });
    whenLoaded(aImg, function () { loadTex(aImg, 1, "uA"); });
  }

  function setDaylight(px, py) {
    if (!gl || texReady < 2) return;
    var lx = (px - cc.x) / cc.s;
    var ly = (py - cc.y) / cc.s;
    gl.uniform3f(uLloc, lx, ly, 0.85);
    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    var m = Math.sqrt(lx * lx + ly * ly) + 0.001;
    coawrap.style.setProperty("--cshx", (-lx / m * Math.min(m, 1) * 10).toFixed(1) + "px");
  }

  function flood(done) {
    var T = 2100;
    var t0 = performance.now();
    function ease(p) { return p < 0.5 ? 2*p*p : 1 - Math.pow(-2*p + 2, 2) / 2; }
    function step(now) {
      var p = Math.min(1, (now - t0) / T);
      root.style.setProperty("--flood", ease(p).toFixed(4));
      if (p < 1) { requestAnimationFrame(step); } else { done(); }
    }
    requestAnimationFrame(step);
  }

  function reveal() {
    document.body.classList.add("breaking");
    initGL();
    measureCoa();
    var finish = function () {
      torn = true;
      measureCoa();
      setTimeout(measureCoa, 200);

    };
    if (reduced) {
      root.style.setProperty("--flood", "1");
      document.body.classList.add("day");
      finish();
      return;
    }
    setTimeout(function () {
      document.body.classList.add("day");      /* text recedes, the light rises */
      flood(finish);
    }, 700);
  }
  addEventListener("resize", function () { if (torn) { measureCoa(); } });
  var gate = document.getElementById("gate");
  var clavis = document.getElementById("clavis");
  var gatemsg = document.getElementById("gatemsg");

  function say(msg) {
    gatemsg.textContent = msg;
    gatemsg.classList.add("show");
  }

  sealEl.addEventListener("click", function () {
    if (gate.hidden) {
      gate.hidden = false;
      requestAnimationFrame(function () {
        gate.classList.add("open");
        measure();
      });
      setTimeout(function () {
        gate.scrollIntoView({ block: "nearest", behavior: reduced ? "auto" : "smooth" });
        clavis.focus({ preventScroll: true });
      }, 80);
    } else {
      gate.classList.remove("open");
      gatemsg.classList.remove("show");
      setTimeout(function () { gate.hidden = true; measure(); }, 380);
    }
  });

  gate.addEventListener("submit", function (e) {
    e.preventDefault();
    if (!GATE.target || !GATE.sha256) { say("Catalogus nondum paratus est"); return; }
    if (!window.crypto || !crypto.subtle) { say("Conexione tuta (https) opus est"); return; }
    var data = new TextEncoder().encode(clavis.value);
    crypto.subtle.digest("SHA-256", data).then(function (buf) {
      var hex = Array.prototype.map.call(new Uint8Array(buf), function (b) {
        return b.toString(16).padStart(2, "0");
      }).join("");
      if (hex === GATE.sha256) {
        gatemsg.classList.remove("show");
        if (GATE.target === "reveal") { reveal(); }
        else { location.href = GATE.target; }
      }
      else { say("Clavis non ualet"); clavis.select(); }
    });
  });
})();
</script>
</body>
</html>
