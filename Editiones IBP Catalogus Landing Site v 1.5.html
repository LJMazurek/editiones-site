  /* ---- the seal's shadow on the floor (it hangs above it) ---- */
  .sealshadow {
    position: fixed;
    z-index: 1;
    top: calc(25vmin + 86px);
    left: 50%;
    width: 23vmin;
    height: 4.6vmin;
    margin-left: -11.5vmin;
    transform: translate(calc(var(--fx) + var(--shx, 0px)), calc(var(--fy) + var(--shy, 0px)));
    background: radial-gradient(closest-side, rgba(0,0,0,0.6), rgba(0,0,0,0) 74%);
    filter: blur(3px);
    opacity: var(--sho, 0);
    pointer-events: none;
  }

  /* ========== THE SEAL — wax, suspended above the floor ========== */
  .seal {
    position: fixed;
    z-index: 2;
    top: calc(2vmin + 86px);
    left: 50%;
    width: 20vmin;
    height: 20vmin;

    -webkit-mask-image: radial-gradient(22rem 22rem at var(--smx) var(--smy),

  /* ========== THE LAMP ========== */
  .lamp {
    position: fixed; inset: 0;
    z-index: 3;
    background:
      radial-gradient(40rem 40rem at var(--mx) var(--my),
        rgba(232, 222, 200, 0.10) 0%,
        rgba(190, 160, 90, 0.045) 30%,
        rgba(13, 12, 11, 0) 70%);
    mix-blend-mode: screen;
    pointer-events: none;
  }
  .vignette {
    position: fixed; inset: 0;
    z-index: 4;
    background: radial-gradient(120vmax 120vmax at 50% 45%,
      transparent 0%, transparent 52%, rgba(0,0,0,0.6) 100%);
    pointer-events: none;
  }

  /* ========== COMPOSITION ========== */
  main {
    position: relative;
    z-index: 5;
    height: 100%;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem 1.5rem;
  }
  .eyebrow {
    font-weight: 500;
    font-size: 0.78rem;
    letter-spacing: 0.62em;
    text-indent: 0.62em;
    text-transform: uppercase;
    color: var(--muted);
  }

  h1 {
    margin-top: 1.6rem;
    font-family: "Cinzel", Georgia, serif;
    font-weight: 500;
    text-transform: uppercase;
    line-height: 1.08;
  }
  h1 .l1 {
    display: block;
    font-size: clamp(2.4rem, 8.2vw, 5rem);
    letter-spacing: 0.18em;
    text-indent: 0.18em;
    background:
      linear-gradient(calc(var(--ga) * 1deg),
        rgba(255, 255, 252, 0) 40%,

  .notice {
    margin-top: calc(3rem + clamp(2.4rem, 8.2vw, 5rem));
    font-size: 0.92rem;
    letter-spacing: 0.30em;
    text-indent: 0.30em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .contact {
    margin-top: 2.7rem;
    font-size: 1.08rem;
    letter-spacing: 0.05em;
  }
  .contact a {
    color: var(--ink);
    text-decoration: none;
    transition: color 0.4s ease;
  }
  .contact a:hover, .contact a:focus-visible { color: var(--gold-bright); }
  .contact a:focus-visible { outline: 1px solid var(--gold-soft); outline-offset: 4px; }

  @media (max-width: 640px) {
    main { padding: 1.25rem 0.75rem; }
    .eyebrow { font-size: 0.64rem; letter-spacing: 0.40em; text-indent: 0.40em; }
    h1 .l1 {
      font-size: clamp(1.7rem, 9.4vw, 3rem);
      letter-spacing: 0.13em;
      text-indent: 0.13em;
    }
    h1 .l2 {
      font-size: clamp(1.2rem, 5.6vw, 2rem);
      letter-spacing: 0.30em;
      text-indent: 0.30em;
      gap: 0.9rem;
    }
    h1 .l2::before, h1 .l2::after { width: clamp(1.3rem, 9vw, 2.6rem); }
    .line   { font-size: 0.92rem; letter-spacing: 0.20em; text-indent: 0.20em; margin-top: 2rem; }
    .year   { font-size: 0.88rem; letter-spacing: 0.34em; text-indent: 0.34em; }
    .notice { font-size: 0.74rem; letter-spacing: 0.15em; text-indent: 0.15em; margin-top: calc(1.6rem + 9.4vw); }
    .contact { font-size: 0.95rem; margin-top: 1.7rem; }
    .floor { background-size: 527px auto; }
    .seal { width: 27vmin; height: 27vmin; margin-left: -13.5vmin; top: calc(2vmin + 52px); }
    .sealshadow { width: 30vmin; margin-left: -15vmin; top: calc(29vmin + 52px); }
  }

  @media (prefers-reduced-motion: no-preference) {
    main > * { opacity: 0; animation: kindle 1.6s ease forwards; }
    .eyebrow { animation-delay: 0.2s; }
    h1       { animation-delay: 0.5s; }
    .line    { animation-delay: 1.0s; }
    .year    { animation-delay: 1.1s; }
    .notice  { animation-delay: 1.4s; }
    .contact { animation-delay: 1.6s; }
    @keyframes kindle { from { opacity: 0; } to { opacity: 1; } }
  }

</head>
<body>

<div class="floor" aria-hidden="true"></div>

<div class="sealshadow" aria-hidden="true"></div>
<div class="seal" aria-hidden="true"></div>

<div class="lamp" aria-hidden="true"></div>
<div class="vignette" aria-hidden="true"></div>

<main>
  <p class="eyebrow">Domus editoria</p>
  <h1 id="title">
    <span class="l1">Editiones</span>
    <span class="l2"><span class="resin">IBP</span></span>
  </h1>
  <p class="line">Catalogus Annuus</p>
  <p class="year">MMXXVII</p>
  <p class="notice">Pagina in apparatu est</p>
  <p class="contact"><a href="mailto:contact@editiones-ibp.org">contact@editiones-ibp.org</a></p>
</main>

<script>
(function () {
  var root = document.documentElement;
  var title = document.getElementById("title");
  var sealEl = document.querySelector(".seal");
  var reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  var tx = innerWidth / 2, ty = innerHeight * 0.42;
  var cx = tx, cy = ty;
  var pointerSeen = false;
  var t = 0;
  var tc = { x: 0, y: 0, bottom: 0, w: 0 };
  var sc = { x: 0, y: 0 };

  function measure() {
    var r = title.getBoundingClientRect();
    tc.x = r.left + r.width / 2;
    tc.y = r.top + r.height / 2;
    tc.bottom = r.bottom;
    tc.w = r.width;
    var s = sealEl.getBoundingClientRect();
    sc.x = s.left + s.width / 2;
    sc.y = s.top + s.height / 2;
    sc.left = s.left;
    sc.top = s.top;
  }
  addEventListener("resize", measure);

  addEventListener("pointermove", function (e) {
    if (e.pointerType === "mouse") { pointerSeen = true; tx = e.clientX; ty = e.clientY; }
  });

  function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

  function frame() {
    if (!pointerSeen) {
      t += 0.004;
      tx = innerWidth  * (0.5 + 0.10 * Math.sin(t));
      ty = innerHeight * (0.40 + 0.16 * Math.sin(t * 0.6 + 1.3));
    }
    cx += (tx - cx) * 0.06;
    cy += (ty - cy) * 0.06;
    root.style.setProperty("--mx", cx + "px");
    root.style.setProperty("--my", cy + "px");

    /* depth: floor lowest, seal 10cm above it, writing 1m above the floor */
    var ox = cx - innerWidth / 2, oy = cy - innerHeight / 2;
    root.style.setProperty("--fx", (ox * -0.014).toFixed(2) + "px");
    root.style.setProperty("--fy", (oy * -0.014).toFixed(2) + "px");
    /* the seal shares the writing's plane: the lamp's pool is mapped
       into the seal's own coordinate space for the reveal */
    sealEl.style.setProperty("--smx", (cx - sc.left).toFixed(1) + "px");
    sealEl.style.setProperty("--smy", (cy - sc.top).toFixed(1) + "px");

    /* light geometry over the title: lamp 30cm above the lettering plane */
    var dx = tc.x - cx, dy = tc.y - cy;
    var dist = Math.sqrt(dx * dx + dy * dy);
    var i = Math.max(0, 1 - dist / 640);
    i = i * i * (3 - 2 * i);
    var s = Math.min(1.1, dist / 270) * 3.4 * i;
    var n = dist > 1 ? 1 / dist : 0;
    var sx = dx * n * s, sy = Math.max(0.35 * s, dy * n * s);
    root.style.setProperty("--sx", sx.toFixed(2) + "px");
    root.style.setProperty("--sy", sy.toFixed(2) + "px");
    root.style.setProperty("--i", i.toFixed(3));
    var ga = Math.atan2(cy - tc.y, cx - tc.x) * 180 / Math.PI + 90;
    root.style.setProperty("--ga", ga.toFixed(1));
    root.style.setProperty("--bx", (-dx * 0.05 * i).toFixed(2) + "%");
    root.style.setProperty("--by", (-dy * 0.05 * i).toFixed(2) + "%");

    /* the seal hangs 10cm above the floor: its shadow answers the lamp */
    var sdx = sc.x - cx, sdy = sc.y - cy;
    var sdist = Math.sqrt(sdx * sdx + sdy * sdy);
    var si = Math.max(0, 1 - sdist / 560);
    si = si * si * (3 - 2 * si);
    root.style.setProperty("--sho", (si * 0.6).toFixed(3));
    root.style.setProperty("--shx", clamp(sdx * 0.22, -70, 70).toFixed(1) + "px");
    root.style.setProperty("--shy", clamp(sdy * 0.10, -22, 30).toFixed(1) + "px");

    requestAnimationFrame(frame);
  }

  measure();
  setTimeout(measure, 120);

  if (reduced) {
    root.style.setProperty("--mx", "50vw");
    root.style.setProperty("--my", "30vh");
  } else {
    requestAnimationFrame(frame);
  }
})();
</script>
</body>
</html>
